name: Run Unit Tests and Report Coverage

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage 2>&1 | tee test_output.log

      - name: Comment PR
        uses: actions/github-script@v6
        if: always()
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const fs = require('fs');

            let testOutput = fs.readFileSync('./test_output.log', 'utf8');
            const maxLength = 60000;

            if (testOutput.length > maxLength) {
              testOutput = testOutput.slice(0, maxLength) + "\n... (truncated)";
            }

            const comment = `## Test Results

            \`\`\`
            ${testOutput}
            \`\`\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
